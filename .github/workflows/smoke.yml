name: smoke test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tangle-and-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emacs
        uses: purcell/setup-emacs@master
        with:
          version: '29.4'

      - name: Check parens in init.el
        run: |
          emacs --batch -Q --eval \
            '(with-temp-buffer (insert-file-contents "init.el") (emacs-lisp-mode) (check-parens))'

      - name: Tangle config.org
        run: |
          emacs --batch -Q \
            --eval "(require 'org)" \
            --eval '(org-babel-tangle-file "config.org" "config.el")'

      - name: Byte-compile config.el
        run: |
          emacs --batch -Q \
            --eval "(setq byte-compile-warnings '(not unresolved free-vars noruntime obsolete))" \
            -f batch-byte-compile config.el

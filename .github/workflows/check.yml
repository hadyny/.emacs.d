name: check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: nix-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - uses: DeterminateSystems/flake-checker-action@de924abd783455e8429c858962b9e43062d19da1 # v13

      # Runs every checks.<system> (defined in flake.nix):
      #   smoke            - check-parens, tangle config.org, byte-compile
      #   appearance       - theme switch stays cross-platform (auto-dark)
      #   unit-tests       - ERT tests for config.org helpers (emacs-nox)
      #   integration-tests- full suite vs the real package set + loaded config
      #   packages-loadable- builds the Nix Emacs, asserts package activation
      #                      + vterm load (straight->nix guard)
      # --no-pure-eval: the devenv-powered devShells.default needs to know the
      # working directory, which pure flake evaluation hides. Without it,
      # `nix flake check` fails evaluating that devShell.
      - name: Check flake
        run: nix flake check --no-pure-eval --print-build-logs

      - name: Check formatting
        run: nix fmt -- --ci

      - name: Lint with statix
        run: nix run nixpkgs#statix -- check .

      - name: Check for dead code
        run: nix run nixpkgs#deadnix -- --fail .

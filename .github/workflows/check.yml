name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/flake-checker-action@v5

      # Runs every checks.<system> (defined in flake.nix):
      #   smoke            - check-parens, tangle config.org, byte-compile
      #   appearance       - theme switch stays cross-platform (auto-dark)
      #   unit-tests       - ERT tests for config.org helpers (emacs-nox)
      #   integration-tests- full suite vs the real package set + loaded config
      #   packages-loadable- builds the Nix Emacs, asserts package activation
      #                      + lsp-tailwindcss/vterm load (straight->nix guard)
      - name: Check flake
        run: nix flake check --print-build-logs

      - name: Check formatting
        run: nix fmt -- --ci

      - name: Lint with statix
        run: nix run nixpkgs#statix -- check .

      - name: Check for dead code
        run: nix run nixpkgs#deadnix -- --fail .
